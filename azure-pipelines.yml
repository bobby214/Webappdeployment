# .NET Build and Deployment Pipeline

trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'windows-latest'

variables:
  solution: '**/*.sln'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'

stages:
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: Build
    displayName: 'Build Application'
    steps:
    - task: DotNetCoreCLI@2
      displayName: 'Restore NuGet packages'
      inputs:
        command: 'restore'
        projects: '$(solution)'

    - task: DotNetCoreCLI@2
      displayName: 'Build the project'
      inputs:
        command: 'build'
        projects: '$(solution)'
        arguments: '--configuration $(buildConfiguration)'

- stage: DeployToApp1
  displayName: 'Deploy to Application 1'
  dependsOn: Build
  jobs:
  - job: Deploy
    displayName: 'Deploy Application 1'
    steps:
    - task: AzureRmWebAppDeployment@4
      displayName: 'Deploy to Azure Web App 1'
      inputs:
        azureSubscription: '<Your Azure Subscription>'
        appType: 'webApp'
        appName: '<Your App 1 Name>'
        package: '$(System.DefaultWorkingDirectory)/**/*.zip'

- stage: DeployToApp2
  displayName: 'Deploy to Application 2'
  dependsOn: Build
  jobs:
  - job: Deploy
    displayName: 'Deploy Application 2'
    steps:
    - task: AzureRmWebAppDeployment@4
      displayName: 'Deploy to Azure Web App 2'
      inputs:
        azureSubscription: '<Your Azure Subscription>'
        appType: 'webApp'
        appName: '<Your App 2 Name>'
        package: '$(System.DefaultWorkingDirectory)/**/*.zip'