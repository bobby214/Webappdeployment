# .NET Build and Deployment Pipeline\n\nparameters:\n  - name: environments\n    type: object\n    default:\n      - Dev\n      - Prod\n\njobs:\n- job: Build\n  displayName: Build\n  pool:\n    vmImage: 'windows-latest'\n  steps:\n  - task: DotNetCoreCLI@2\n    inputs:\n      command: 'build'\n      projects: '**/*.csproj'\n      versioningScheme: 'byBuildNumber'\n\n- job: Deploy\n  displayName: Deploy\n  pool:\n    vmImage: 'windows-latest'\n  strategy:\n    parallel: true\n    maxParallel: 2\n  steps:\n  - ${{ each environment in parameters.environments }}:\n    - script: echo Deploying to ${{ environment }}\n      displayName: 'Deploy to ${{ environment }}'\n      env:\n        ENVIRONMENT: ${{ environment }}\n  - script: echo Deployment to ${{ environment }} completed!\n      displayName: 'Post-Deployment to ${{ environment }}'\n